##############################################################
# Nginx Configuration — cleanairindia.com
# Fixes identified from Pingdom HAR analysis:
#   1. Enable HTTP/2 to prevent repeated TLS handshakes
#   2. Enable gzip compression for CSS/JS (was uncompressed)
#   3. Proper caching headers for static assets
#   4. Security headers
##############################################################

server {
    listen 80;
    server_name www.cleanairindia.com cleanairindia.com;

    # Redirect HTTP → HTTPS
    return 301 https://www.cleanairindia.com$request_uri;
}

server {
    # HTTP/2 enabled — prevents repeated TLS handshakes per-asset (fixes +122ms per connection)
    listen 443 ssl http2;
    server_name www.cleanairindia.com cleanairindia.com;

    root /var/www/CleanAirInidia/dist;
    index index.html;

    # ── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/cleanairindia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cleanairindia.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Gzip Compression ────────────────────────────────────
    # Fixes: index-kIXotnW8.css was 56KB uncompressed → now ~7.6KB gzipped
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/opentype
        application/vnd.ms-fontobject;

    # ── Keep-Alive Tuning ────────────────────────────────────
    keepalive_timeout  65;
    keepalive_requests 100;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static Assets — Long Cache (Vite hashed filenames) ──
    # Vite bundles use content-hash filenames (e.g. index-kIXotnW8.css)
    # Safe to cache for 1 year as filenames change on every build
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        gzip_static on;
        try_files $uri =404;
    }

    # ── Public Static Files (images, fonts, etc.) ───────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # ── React SPA Routing ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Short cache for HTML (so updates deploy quickly)
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # ── Deny access to hidden files ──────────────────────────
    location ~ /\. {
        deny all;
    }
}
