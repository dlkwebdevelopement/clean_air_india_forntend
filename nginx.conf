##############################################################
# Nginx Configuration — cleanairindia.com
# Performance fixes from Lighthouse audit:
#   1. HTTP/2 — eliminates repeated TLS handshakes
#   2. Gzip compression — CSS/JS sent compressed
#   3. Cache headers — 5,216 KiB of assets had Cache TTL: None
#   4. Security headers
##############################################################

server {
    listen 80;
    server_name www.cleanairindia.com cleanairindia.com;

    # Redirect HTTP → HTTPS
    return 301 https://www.cleanairindia.com$request_uri;
}

server {
    # HTTP/2 enabled — prevents repeated TLS handshakes per-asset
    listen 443 ssl http2;
    server_name www.cleanairindia.com cleanairindia.com;

    root /var/www/CleanAirInidia/dist;
    index index.html;

    # ── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/cleanairindia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cleanairindia.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/opentype
        application/vnd.ms-fontobject;

    # ── Keep-Alive Tuning ────────────────────────────────────
    keepalive_timeout  65;
    keepalive_requests 100;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── /assets/ — 1 Year Cache (Vite content-hashed filenames) ──
    # Covers ALL assets: JS, CSS, webp, svg, mp4, webm, pdf, gif, png, jpg
    # Safe to cache for 1 year — Vite changes filename hash on every build
    # This fixes the 5,216 KiB of assets with Cache TTL: None
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # ── /css/ — Bootstrap local fallback file ────────────────
    location /css/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # ── /js/ — Public JS files ───────────────────────────────
    location /js/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # ── Public root files (favicon, logos, etc.) ─────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|mp4|webm|pdf)$ {
        expires 6M;
        add_header Cache-Control "public, max-age=15552000";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # ── React SPA Routing ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for HTML — new deployments take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── Deny access to hidden files ──────────────────────────
    location ~ /\. {
        deny all;
    }
}
