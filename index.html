    <!-- Google tag (gtag.js) - Deferred and loaded lazily to maximize main thread performance -->
    <script>
      window.addEventListener('load', function() {
        const delayTimer = setTimeout(function() {

            window.gtag = gtag;
            gtag('js', new Date());
            gtag('config', 'G-LKJRERJLCC');
          };
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadTag);
          } else {
            loadTag();
          }
